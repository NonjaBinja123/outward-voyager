# Outward Voyager Agent Configuration

websocket:
  host: localhost
  port: 9999

llm:
  # Priority order — cloud providers rotate round-robin, ollama is always fallback
  priority:
    - claude
    - gemini
    - openai
    - ollama

  providers:
    ollama:
      base_url: http://localhost:11434
      model: llama3.1:8b
      enabled: true

    claude:
      model: claude-sonnet-4-6
      enabled: true  # auto-skipped if ANTHROPIC_API_KEY not set

    openai:
      model: gpt-4o
      enabled: true  # auto-skipped if OPENAI_API_KEY not set

    gemini:
      model: gemini-2.0-flash
      enabled: true  # auto-skipped if GOOGLE_API_KEY not set

  # Optional: route specific task types to specific providers
  # task_routing:
  #   chat: gemini       # fast + cheap for player chat
  #   strategy: claude   # best reasoning for decisions
  #   code: claude       # best for code generation

agent:
  # How often the strategy loop fires (seconds)
  strategy_interval: 30
  # How often the rule engine fires (seconds)
  rule_interval: 2
  # Max retries before escalating to Josh via chat
  max_retries: 3
  # Agent's name in chat
  chat_name: Voyager
  # When false: player movement commands execute directly (dev/control mode)
  # When true: movement suggestions go through the agent's decision layer —
  # the agent weighs them against its own goals, health, and preferences,
  # and may comply, refuse, or do something else entirely.
  autonomous_movement: false

memory:
  chroma_path: ./data/chroma
  journal_collection: adventure_journal
  max_journal_entries: 10000

skills:
  db_path: ./data/skills.db

goals:
  session_goals_path: ./data/session_goals.json
  long_term_goals_path: ./data/long_term_goals.json

logging:
  level: INFO
  file: ./logs/voyager.log
